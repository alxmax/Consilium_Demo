<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Consilium — How it works</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<style>
@page { size: A4 portrait; margin: 14mm 12mm; }

@media print {
  html, body {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    background: #f4ecd8 !important;
  }

  /* Hide UI chrome that doesn't belong on paper */
  .topbar,
  .side-nav,
  .mobile-nav,
  .scroll-progress,
  .twk-panel,
  .topbar__repo,
  .tldr,
  .page::before,
  .page::after,
  #modes::before,
  #modes::after,
  .modes-bg-extra {
    display: none !important;
  }

  body, .page {
    background: #f4ecd8 !important;
    overflow: visible !important;
    padding-top: 0 !important;
  }

  .container {
    max-width: 100% !important;
    padding: 0 !important;
  }

  /* Each numbered section on its own page */
  .section {
    padding: 0 0 16mm !important;
    border-top: 0 !important;
    background: transparent !important;
  }
  .section:not(:first-of-type) {
    break-before: page;
    page-break-before: always;
  }
  .section--inked {
    background: #1a1612 !important;
    color: #f3eee2 !important;
    padding: 12mm !important;
  }
  .section--tinted {
    background: #ebe2c8 !important;
    padding: 8mm 6mm !important;
  }

  .hero { padding: 4mm 0 12mm !important; overflow: visible !important; }
  .hero::before { display: none !important; }
  .hero .container::before,
  .hero .container::after { display: none !important; }

  body { font-size: 11pt !important; line-height: 1.45 !important; }
  .h-display { font-size: 32pt !important; line-height: 1.05 !important; }
  .h-section { font-size: 22pt !important; line-height: 1.1 !important; }
  .h-sub { font-size: 14pt !important; }
  .lede, .hero__lede { font-size: 12pt !important; line-height: 1.45 !important; }

  .voice-card,
  .skeptic-card,
  .constitution__item,
  .two-layer__cell,
  .mode-panel,
  .persona,
  .note,
  .scheme-row,
  .cascade-row,
  .step-track,
  .lens-heatmap__row,
  .walkthrough,
  .loop-cell,
  .step-detail,
  pre,
  svg.diagram {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  h1, h2, h3, h4 {
    break-after: avoid-page;
    page-break-after: avoid;
  }

  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }

  /* Open all collapsibles so nothing is hidden in the PDF */
  .collapsible-btn { display: none !important; }
  .collapsible-btn + div {
    max-height: none !important;
    opacity: 1 !important;
    overflow: visible !important;
    margin-top: 18px !important;
  }

  /* Freeze playback controls; show diagram */
  .walkthrough__controls .btn,
  .mode-panel__controls .btn,
  .pipeline__playhead .btn {
    display: none !important;
  }
  .walkthrough__caption,
  .mode-panel__caption {
    color: #1a1612 !important;
    font-size: 10pt !important;
  }
  .walkthrough__timeline {
    overflow: visible !important;
  }
  .timeline-step {
    background: #f4ecd8 !important;
    color: #1a1612 !important;
    border-color: #d8d0b8 !important;
  }
  .timeline-step[data-state="active"],
  .step-pill[data-active="true"] {
    background: #1a1612 !important;
    color: #f4ecd8 !important;
  }

  .diagram, svg.diagram {
    width: 100% !important;
    max-width: 100% !important;
    height: auto !important;
  }

  .footer { padding: 6mm 0 !important; border-top: 1px solid #d8d0b8 !important; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/extras.jsx"></script>
<script type="text/babel" src="src/voices.jsx"></script>
<script type="text/babel" src="src/cascade.jsx"></script>
<script type="text/babel" src="src/pipeline.jsx"></script>
<script type="text/babel" src="src/voting.jsx"></script>
<script type="text/babel" src="src/modes.jsx"></script>
<script type="text/babel" src="src/trias.jsx"></script>
<script type="text/babel" src="src/loop.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<!-- Wait for app + fonts, open all collapsibles, then print -->
<script type="text/babel">
(async () => {
  const waitForApp = () => new Promise((resolve) => {
    const tick = () => {
      const root = document.getElementById('root');
      if (root && root.querySelector('.page')) return resolve();
      requestAnimationFrame(tick);
    };
    tick();
  });
  await waitForApp();

  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  document.querySelectorAll('.collapsible-btn').forEach((b) => {
    if (b.getAttribute('data-open') !== 'true') b.click();
  });

  await new Promise((r) => setTimeout(r, 500));
  window.print();
})();
</script>
</body>
</html>
