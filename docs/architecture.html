    desc: 'Values internal consistency, type safety, clean abstractions. Long-term maintainability over short-term wins. Prefers changes that strengthen invariants over those that work around them.',
  },
  {
    name: 'Steward',
    tag: 'protective',
    g: 0.30, c: 0.30, k: 0.40,
    desc: 'Values reversibility, minimal scope, and protection of systems that already work. Prefers existing patterns over novel ones unless the new is clearly necessary. Blast radius is the dominant concern.',
  },
];

const TRIAS_OUTCOMES = [
  { p: '3–0', label: 'Unanimous', desc: 'All three personalities picked the same.', conf: 0.95, outcome: 'OK auto' },
  { p: '2–1', label: 'Majority + dissent', desc: 'One personality prefers a different candidate; dissent logged.', conf: 0.75, outcome: 'OK auto' },
  { p: '2–0', label: 'Majority + abstention', desc: 'One personality abstained — its own chose=null (all its candidates vetoed); the two agreeing personalities still elect a winner.', conf: 0.70, outcome: 'OK auto' },
  { p: '1–1–1', label: 'Fragmented', desc: 'Three distinct chosen results · no consensus → B2 deadlock cascade.', conf: null, outcome: 'Round 2 → Skeptic → PEND' },
  { p: '1–1–0', label: 'Split + abstention', desc: 'Two distinct chosen results · one personality vetoed all. No majority.', conf: null, outcome: 'PEND' },
  { p: '1–0–0', label: 'Lone vote + 2 abstentions', desc: 'One chosen result · two personalities vetoed all. No majority.', conf: null, outcome: 'PEND' },
  { p: '0–0–0', label: 'Total veto', desc: 'All three personalities vetoed all candidates → B2 cascade, then PEND.', conf: null, outcome: 'Round 2 → PEND' },
];

function TriasSection() {
  return (
    <section className="section" id="trias">
      <div className="container">
        <SectionHead
          num="08"
          eyebrow="Trias — deep dive"
          title="Three personalities, one verdict."
          lede="Same three voices, but each personality biases them differently. The orchestrator dispatches three isolated sub-agents, then runs a democratic vote on their three chosen answers."
        />

        <div className="tldr">
          <span className="tldr__label">In plain words</span>
          <div>
            <p>Three Claudes each run the full pipeline — one is told to be bold, one structural, one cautious. They each pick a winner. A majority vote of the three picks the final answer. If they fragment 1-1-1, escalate.</p>
          </div>
        </div>

        <div className="trias-personalities">
          {LENSES.map((l) => (
            <PersonaCard key={l.name} {...l} />
          ))}
        </div>

        <h3 className="h-sub" style={{ marginTop: 8 }}>Lens weights — heatmap</h3>
        <p className="body-prose" style={{ color: 'var(--ink-2)', marginBottom: 16 }}>
          Each row sums to 1.0. The darker the cell, the heavier that lens leans on that voice.
        </p>
        <LensHeatmap lenses={LENSES} />

        <h3 className="h-sub" style={{ marginTop: 40 }}>Lazy routing — when Trias auto-downgrades</h3>
        <p className="body-prose" style={{ color: 'var(--ink-2)', marginBottom: 22 }}>
          Trias costs 3× Sequential. To avoid the bill on changes that don't need it, the orchestrator checks magnitude via <code>scope_gate.py</code>, then routes down a graduated ladder: <strong>low / medium → Sequential</strong> (1×), <strong>high → Dialectic</strong> (1.33×), and only a <strong>critical</strong> change — a blocklist hit (auth, security, migrations, CI workflows, secrets) — proceeds to <strong>full Trias</strong> (3×). At low/medium magnitude even Dialectic's one Skeptic isn't worth the cost. The user can override with an explicit flag.
        </p>

        <LazyRoutingDiagram />

        <h3 className="h-sub" style={{ marginTop: 40 }}>Vote outcomes</h3>
        <p className="body-prose" style={{ color: 'var(--ink-2)', marginBottom: 24 }}>
          Each personality casts one vote. Below: every possible pattern, the confidence it produces, and what happens next.
        </p>

        <Collapsible label="Show all vote patterns" defaultOpen={true}>
          <VoteOutcomesTable rows={TRIAS_OUTCOMES} />
        </Collapsible>

        <div className="note" style={{ marginTop: 28 }}>
          <span className="note__label">Deadlock cascade — 1-1-1 / 0-0-0</span>
          <span>
            A true tie doesn't resolve to a "senior" personality — it escalates. <strong>Round 2</strong> re-dispatches all three personalities (+3 sub-agents), each now seeing the other two's Round-1 pick and reasoning. If they still split 1-1-1, a single <strong>Skeptic</strong> tiebreaker (+1 sub-agent) selects the winner; <code>0-0-0</code> — everyone vetoed everything — falls straight through to <strong>PEND</strong>. That path is the worst-case cost of <strong>7 sub-agents</strong> (3 + Round 2's 3 + 1 Skeptic). In practice it is rare: <strong>4 of 37</strong> Trias runs reached a 1-1-1 deadlock (≈11%), and ≈51% were non-unanimous — measured by <code>scripts/vote_degeneracy.py</code>.
          </span>
        </div>

        <div className="note" style={{ marginTop: 16 }}>
          <span className="note__label">Aggregate bias</span>
          <span>
            Mean weights across the three personalities: <VToken v="gen">Generator 0.363</VToken>, <VToken v="ctl">Control 0.333</VToken>, <VToken v="con">Conservator 0.303</VToken>. Compared to a balanced 0.333, the team tilts <strong>slightly toward exploration</strong>. Trias costs 3× Sequential — use only when the cost of a wrong decision dominates the cost of running 9 voice invocations.
          </span>
        </div>
      </div>
    </section>
  );
}

function PersonaCard({ name, tag, g, c, k, desc }) {

}

function PersonaBar({ v, label, w }) {
  return (
    <div className="persona-bar">

}

function LensHeatmap({ lenses }) {
  const colors = {
    gen: 'oklch(0.66 0.13 55)',
    ctl: 'oklch(0.62 0.13 245)',
    con: 'oklch(0.62 0.18 25)',
  };

  return (
    <div className="lens-heatmap">
      <div className="lens-heatmap__row lens-heatmap__row--head">
        <div className="lens-heatmap__cell lens-heatmap__cell--head">Lens / Voice</div>
        <div className="lens-heatmap__cell">Generator</div>
        <div className="lens-heatmap__cell">Control</div>
        <div className="lens-heatmap__cell">Conservator</div>
      </div>
      {lenses.map((l) => (
        <div key={l.name} className="lens-heatmap__row">
          <div className="lens-heatmap__cell lens-heatmap__cell--head">{l.name}</div>
          <HeatCell w={l.g} color={colors.gen} />
          <HeatCell w={l.c} color={colors.ctl} />
          <HeatCell w={l.k} color={colors.con} />
        </div>
      ))}
    </div>
  );
}

function HeatCell({ w, color }) {
  // intensity: 0.2 → 0.5 weight maps to ~0.12 → 0.94 alpha (floor 0.12)
  const alpha = Math.max(0.12, Math.min(1, (w - 0.18) / 0.34));
  return (
    <div className="lens-heatmap__cell">
      <div
        className="lens-heatmap__weight"
        style={{
          background: `color-mix(in oklch, ${color} ${(alpha * 100).toFixed(0)}%, transparent)`,
          color: alpha > 0.55 ? 'var(--paper)' : 'var(--ink)',
        }}
      >
        {w.toFixed(2)}
      </div>
    </div>
  );
}

<script type="text/babel" data-source="src/loop.jsx">
/* loop.jsx — calibration / feedback loop */

function LoopSection() {
  return (
    <section className="section section--tinted" id="loop">
      <div className="container">
        <SectionHead
          num="10"
          eyebrow="Calibration"
          title="The skill calibrates itself between runs."
          lede="Every deliberation appends an outcome line to FEEDBACK.html. Before the next run, priors.py reads the log and computes soft priors the orchestrator injects at step 0 — so the system's risk intuition tunes itself on real history."
        />

        <div className="loop-cell">
          <LoopDiagram />
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, marginTop: 28 }}>
          <OutcomeChip code="OK" desc="auto-logged, confidence ≥ 0.7" />
          <OutcomeChip code="OVR" desc="user overrode the chosen candidate" />
          <OutcomeChip code="PEND" desc="deferred — retro-closed via stale_pendings" warn />
          <OutcomeChip code="BAD" desc="set manually later if the decision failed" warn />
        </div>

        <h3 className="h-sub" style={{ marginTop: 44, fontSize: 20 }}>What "calibration" actually means here</h3>
        <p className="body-prose" style={{ color: 'var(--ink-2)', marginBottom: 14, maxWidth: 780 }}>
          Nothing is re-trained — there are no model weights to update. Calibration here is bookkeeping: each run leaves a typed trace on disk, and <code>priors.py</code> distils the accumulated traces into a few soft signals injected at the next run's bootstrap (step 0). The signals <strong>nudge attention and surface unfinished business — they never override a voice or change a score</strong>. It is a slow instrument: a single run barely moves anything; the patterns only become legible across dozens of runs.
        </p>

        <h3 className="h-sub" style={{ marginTop: 24, fontSize: 16 }}>The signals priors.py computes</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12, marginTop: 12 }}>
          {[
            { k: 'override_rate', v: 'how often the human overrode the chosen answer — a standing humility signal on the aggregator' },
            { k: 'veto_rate', v: 'how often Conservator vetoed every candidate — flags task types where the skill keeps stalling' },
            { k: 'recurring keywords', v: 'task labels that keep reappearing, so a repeat decision can reuse a prior authoritative run (passthrough)' },
            { k: 'stale_pendings', v: 'PEND rows older than 2 days — the next run pauses to ask you to close them before deliberating' },
            { k: 'weighted_bad_rate', v: 'BAD outcomes, with production-confirmed ones (mark_outcome.py) weighted 2× over a subjective first impression' },
            { k: 'pend_pressure', v: 'share of recent runs left unresolved — a soft alert, never a block' },
          ].map((s) => (
            <div key={s.k} style={{ padding: '12px 16px', border: '1px solid var(--rule)', borderRadius: 4, background: 'var(--paper)' }}>
              <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--ink)', fontWeight: 600 }}>{s.k}</code>
              <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.5, marginTop: 4 }}>{s.v}</div>
            </div>
          ))}
        </div>

        <div className="note" style={{ marginTop: 24 }}>
          <span className="note__label">Confidence floors — the per-mode self-check</span>
          <span>
            The other half of calibration runs <em>inside</em> a single deliberation. Each mode has a confidence floor it is expected to clear — <strong>Sequential 0.70 · Dialectic 0.75 · Trias 0.80</strong>. A run that lands below its floor is logged <code>WEAK</code>: a recorded signal that the mode didn't earn its cost on that task. No single WEAK run changes behaviour; the value is the accumulated rate, which becomes meaningful after ~10 runs per mode and tells you whether a pricier mode is actually buying confidence.
          </span>
        </div>

        <div className="note" style={{ marginTop: 16 }}>
          <span className="note__label">Why the loop closes on disk, not in a model</span>
          <span>
            The whole loop is files: <code>.consilium/runs/*.json</code> (one episodic record per run) and <code>.consilium/FEEDBACK.html</code> (one outcome row per use). <code>priors.py</code> reads both at the next bootstrap — that read is the closing edge. Keeping it on disk is deliberate: the trail is inspectable, diffable, and survives across sessions without any training step or external store.
          </span>
        </div>
      </div>
    </section>
  );
}

      <text x="500" y="42" textAnchor="middle" className="d-faint" style={{ fontSize: 11 }}>

      </text>

      <text x="30" y="296" style={{ fontFamily: 'var(--font-mono)', fontSize: 11, fill: 'var(--ink-2)' }}>

}

<script type="text/babel" data-source="src/efficiency-section.jsx">
/* efficiency-section.jsx — Usage & Efficiency section */

const MODES_DATA = [
  { mode: 'sequential',  costMultiplier: '1×',    usd: '~$0.11', dispatches: 0,  note: 'in-context baseline · measured' },
  { mode: 'dialectic',   costMultiplier: '1.33×', usd: '~$0.15', dispatches: 1,  note: '+ 1 skeptic sub-agent' },
  { mode: 'trias',       costMultiplier: '3×',    usd: '~$0.33', dispatches: 3,  note: '3 personality sub-agents (9 voice runs)' },
  { mode: 'skeptic_on_chosen', costMultiplier: 'base +1', usd: '+~$0.04', dispatches: 1, note: 'composable flag over any base' },
];

function BarChart({ data }) {
  const max = Math.max(...data.map(d => d.value));
  const colors = {
    sequential: 'var(--gen)',
    dialectic:  'var(--ctl)',
    trias:      'oklch(0.55 0.18 260)',
    parallel:   'var(--con)',
  };
  return (
    <svg viewBox={`0 0 640 ${data.length * 64 + 20}`} className="diagram" style={{ maxHeight: 360 }}>
      {data.map((d, i) => {
        const barW = max > 0 ? (d.value / max) * 420 : 0;
        const y = i * 64 + 10;
        const col = colors[d.mode] || 'var(--ink-2)';
        return (
          <g key={d.mode}>
            <text x="0" y={y + 16} style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fill: 'var(--ink)' }}>{d.mode}</text>
            <text x="0" y={y + 32} style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--ctl-ink)' }}>{d.model}</text>
            <rect x="160" y={y + 6} width={barW} height={28} rx="3" fill={col} opacity="0.8" />
            <text x={160 + barW + 8} y={y + 24} style={{ fontSize: 12, fill: 'var(--ink-2)', fontFamily: 'var(--font-mono)' }}>
              {d.label}
            </text>
          </g>
        );
      })}
      <text x="0" y={data.length * 64 + 16} style={{ fontSize: 11, fill: 'var(--ink-3)', fontVariantNumeric: 'tabular-nums' }}>
        measured tokens / voice dispatch · lower = cheaper per voice call
      </text>
    </svg>
  );
}

function ModeRow({ mode, costMultiplier, usd, dispatches, note }) {
  return (
    <tr>
      <td style={{ fontFamily: 'var(--font-mono)', fontWeight: 600, padding: '10px 16px 10px 0', borderBottom: '1px solid var(--rule)' }}>{mode}</td>
      <td style={{ padding: '10px 16px', borderBottom: '1px solid var(--rule)', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{costMultiplier}</td>
      <td style={{ padding: '10px 16px', borderBottom: '1px solid var(--rule)', textAlign: 'right', fontFamily: 'var(--font-mono)', color: 'var(--ctl-ink)' }}>{usd}</td>
      <td style={{ padding: '10px 16px', borderBottom: '1px solid var(--rule)', textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{dispatches}</td>
      <td style={{ padding: '10px 16px 10px 0', borderBottom: '1px solid var(--rule)', fontSize: 12, color: 'var(--ink-2)' }}>{note}</td>
    </tr>
  );
}

function EfficiencySection() {
  // Measured by scripts/efficiency.py over runs/*.json telemetry (2026-05-30).
  // tokens_per_dispatch is outcome-independent (no labelling needed), unlike
  // tokens_per_OK which is still gated on more confirmed-OK labels.
  const measured = [
    { mode: 'sequential', value: 1565, label: '1 565 tok · n=131', model: 'Sonnet 4.6' },
    { mode: 'dialectic',  value: 2313, label: '2 313 tok · n=20',  model: 'Sonnet 4.6' },
    { mode: 'trias',      value: 6346, label: '6 346 tok · n=37',  model: 'Sonnet 4.6' },
    { mode: 'parallel',   value: 5367, label: '5 367 tok · n=26',  model: 'Sonnet 4.6' },
  ];

  return (
    <section className="section" id="efficiency">
      <div className="container">
        <SectionHead
          num="12"
          eyebrow="Usage & Efficiency"
          title="How much does each mode actually cost?"
          lede="scripts/efficiency.py rolls up per-dispatch telemetry from every run. The chart below is a frozen snapshot of measured tokens-per-dispatch, captured 2026-05-30 — re-run the command in the panel below for current numbers. The stricter tokens_per_OK metric also exists but is held back until enough runs carry a confirmed OK/BAD label — honest measurement over a flattering one."
        />

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32, marginTop: 32, alignItems: 'start' }}>
          <div>
            <h3 style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)', marginBottom: 4 }}>Mode cost multipliers</h3>
            <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', marginBottom: 16 }}>1× baseline = Sequential on Sonnet 4.6 · $/run ≈ multiplier × measured Sequential</p>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr>
                  <th style={{ textAlign: 'left', padding: '6px 16px 6px 0', borderBottom: '2px solid var(--rule-2)', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)' }}>Mode</th>
                  <th style={{ textAlign: 'right', padding: '6px 16px', borderBottom: '2px solid var(--rule-2)', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)' }}>Cost</th>
                  <th style={{ textAlign: 'right', padding: '6px 16px', borderBottom: '2px solid var(--rule-2)', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)' }}>$ / run</th>
                  <th style={{ textAlign: 'right', padding: '6px 16px', borderBottom: '2px solid var(--rule-2)', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)' }}>Sub-agents</th>
                  <th style={{ textAlign: 'left', padding: '6px 0', borderBottom: '2px solid var(--rule-2)', fontSize: 11, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)' }}>Note</th>
                </tr>
              </thead>
              <tbody>
                {MODES_DATA.map(m => <ModeRow key={m.mode} {...m} />)}
              </tbody>
            </table>
          </div>

          <div>
            <h3 style={{ fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)', marginBottom: 4 }}>tokens / dispatch (measured)</h3>
            <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', marginBottom: 16 }}>frozen snapshot · efficiency.py over runs/*.json · captured 2026-05-30</p>
            <BarChart data={measured} />
          </div>
        </div>

        <div style={{ marginTop: 32, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
          {[
            { role: 'Orchestrator', model: 'your session model', color: 'var(--con)', note: 'the main Claude Code session that runs the workflow and dispatches sub-agents — on whatever model you launched Claude Code with (Opus or Sonnet). The skill does not pin it; Opus gives the strongest orchestration.' },
            { role: 'Voices & sub-agents', model: 'Sonnet', color: 'var(--ctl)', note: 'Generator · Control · Conservator · Skeptic · Trias personalities — pinned to model: "sonnet"; they do not inherit the session model.' },
            { role: 'Override', model: '→ Opus', color: 'var(--gen)', note: 'an opt-in that bumps the Generator from its pinned Sonnet up to Opus for high-stakes / ambiguous changes.' },
          ].map((m) => (
            <div key={m.role} style={{ padding: '14px 16px', border: '1px solid var(--rule)', borderTop: `3px solid ${m.color}`, borderRadius: 4, background: 'var(--paper)' }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 4 }}>{m.role}</div>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 15, fontWeight: 600, color: m.color, marginBottom: 6 }}>{m.model}</div>
              <p style={{ fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.5, margin: 0 }}>{m.note}</p>
            </div>
          ))}
        </div>

        <div style={{ marginTop: 20, padding: '20px 24px', background: 'var(--paper-2)', border: '1px solid var(--rule)', borderRadius: 4 }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--ink-2)', marginBottom: 12 }}>Reproduce / live data</div>
          <code style={{ display: 'block', fontSize: 12, fontFamily: 'var(--font-mono)', lineHeight: 1.8, color: 'var(--ink)' }}>
            python scripts/efficiency.py --by-mode<br />
            python scripts/efficiency.py --self-test<br />
            python scripts/efficiency.py --compare trias sequential --since 2026-05-01
          </code>
        </div>

        <div style={{ marginTop: 20, padding: '16px 24px', background: 'color-mix(in oklch, var(--con) 6%, var(--paper))', border: '1px solid color-mix(in oklch, var(--con) 20%, var(--rule))', borderRadius: 4 }}>
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--con)', marginBottom: 8 }}>Caveats</div>
          <ul style={{ fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.7, paddingLeft: 20 }}>
            <li>Token estimates use chars/4 (±10–20% error band), consistent across modes.</li>
            <li>This is cost <em>per dispatch</em>, not per run — total run cost ≈ dispatches × this, which the cost-multiplier column on the left captures (Sequential 1×, Trias 3×).</li>
            <li>`tokens_per_OK` (cost per confirmed-good outcome) is the stricter metric but is withheld until enough runs carry an OK/BAD label — most current runs are unlabeled, which would inflate it.</li>
            <li>Modes with fewer than 3 runs with telemetry show <code style={{ fontFamily: 'var(--font-mono)' }}>insufficient_data</code>.</li>
          </ul>
        </div>
      </div>
    </section>
  );
}

window.EfficiencySection = EfficiencySection;

</script>
<script type="text/babel" data-source="src/app.jsx">
/* app.jsx — top-level layout (v2, with side nav + progress) */

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable"
}/*EDITMODE-END*/;

const SECTIONS = [
  { id: 'problem',      num: '01', name: 'Premise' },
  { id: 'voices',       num: '02', name: 'Voices' },
  { id: 'architecture', num: '03', name: 'Layers' },
  { id: 'pipeline',     num: '04', name: 'Pipeline' },
  { id: 'cascade',      num: '05', name: 'Cascade' },
  { id: 'voting',       num: '06', name: 'Aggregation' },
  { id: 'modes',        num: '07', name: 'Modes' },
  { id: 'trias',        num: '08', name: 'Trias' },
  { id: 'benchmark',    num: '09', name: 'Benchmark' },
  { id: 'loop',         num: '10', name: 'Calibration' },
  { id: 'implement',    num: '11', name: 'Integration' },
  { id: 'efficiency',   num: '12', name: 'Efficiency' },
];

function App() {
  const [t, setTweak] = useTweaks(DEFAULTS);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.setAttribute('data-density', t.density);
  }, [t.theme, t.density]);

  return (
    <div className="page">
      <ScrollProgress />
      <Topbar />
      <MobileNav />
      <SideNav />
      <Hero />
      <ProblemSection />
      <VoicesSection />
      <TwoLayerSection />
      <PipelineSection />
      <CascadeSection />
      <VotingSection />
      <ModesSection />
      <TriasSection />
      <BenchmarkSection />
      <LoopSection />
      <ImplementSection />
      <EfficiencySection />
      <Footer />
      <Tweaks t={t} setTweak={setTweak} />
    </div>
  );
}

function useActiveSection() {
  const [active, setActive] = React.useState(SECTIONS[0].id);
  React.useEffect(() => {
    const onScroll = () => {
      const middle = window.scrollY + window.innerHeight * 0.35;
      let current = SECTIONS[0].id;
      for (const s of SECTIONS) {
        const el = document.getElementById(s.id);
        if (el && el.offsetTop <= middle) current = s.id;
      }
      setActive(current);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return active;
}

function ScrollProgress() {
  const [pct, setPct] = React.useState(0);
  React.useEffect(() => {
    const onScroll = () => {
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      const p = docH > 0 ? (window.scrollY / docH) * 100 : 0;
      setPct(Math.max(0, Math.min(100, p)));
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="scroll-progress" style={{ width: `${pct}%` }} aria-hidden="true" />;
}

function SideNav() {
  const active = useActiveSection();
  const handleJump = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  };
  return (
    <nav className="side-nav" aria-label="Section navigation">
      <div className="side-nav__label">contents</div>
      <ul className="side-nav__list">
        {SECTIONS.map((s) => (
          <li key={s.id} className="side-nav__item">
            <button
              className="side-nav__link"
              data-active={s.id === active}
              onClick={() => handleJump(s.id)}
            >
              <span className="side-nav__num">{s.num}</span>
              <span>{s.name}</span>
            </button>
          </li>
        ))}
      </ul>
    </nav>
  );
}

function MobileNav() {
  const active = useActiveSection();
  return (
    <nav className="mobile-nav" aria-label="Section navigation">
      {SECTIONS.map((s) => (
        <a key={s.id} href={`#${s.id}`} className="mobile-nav__link" data-active={s.id === active}>
          <span className="mobile-nav__num">{s.num}</span>
          {s.name}
        </a>
      ))}
    </nav>
  );
}

function Topbar() {
  return (
    <div className="topbar">
      <div className="topbar__brand">
        <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
          <circle cx="7" cy="8" r="3.2" fill="var(--gen)" />
          <circle cx="15" cy="8" r="3.2" fill="var(--ctl)" />
          <circle cx="11" cy="15" r="3.2" fill="var(--con)" />
        </svg>
        consilium
      </div>
      <a
        className="topbar__repo"
        href="https://github.com/alxmax/Consilium"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true" style={{ flexShrink: 0 }}>
          <path
            fill="currentColor"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
        <span>View repository</span>
        <span style={{ opacity: 0.5, marginLeft: 'auto' }}>↗</span>
      </a>
    </div>
  );
}

function Hero() {
  return (
    <section className="hero">
      <div className="container">
        <div className="hero__meta">
          <span className="hero__dot" />
          <span>CLAUDE CODE SKILL</span>
          <span style={{ opacity: 0.4 }}>·</span>
          <span>2026</span>
        </div>
        <h1 className="h-display">
          A second opinion,
          <br />
          structured.
        </h1>
        <p className="hero__lede">
          Consilium evaluates every risky code change through three independent voices — a skeptic, a creative, an analyst — then aggregates them under a veto cascade. One canonical decision, with the disagreement preserved on disk.
        </p>
        <div className="hero__chips">
          <span className="chip"><span className="chip__swatch" style={{ background: 'var(--con)' }} />Conservator</span>
          <span className="chip"><span className="chip__swatch" style={{ background: 'var(--gen)' }} />Generator</span>
          <span className="chip"><span className="chip__swatch" style={{ background: 'var(--ctl)' }} />Control</span>
          <span className="chip"><span className="chip__swatch" style={{ background: 'oklch(0.55 0.16 320)' }} />Skeptic</span>
          <span className="chip">3 modes + 1 flag + 1 auto</span>
          <span className="chip">3 score-combination schemes</span>
          <span className="chip">8-component cascade</span>
          <span className="chip">self-calibrating</span>
        </div>
      </div>
    </section>
  );
}

function ProblemSection() {
  return (
    <section className="section section--inked" id="problem">
      <div className="container">
        <div className="divider-num" style={{ color: 'var(--ink-3)' }}>
          <span className="divider-num__id">01</span> <span>·</span> The premise
        </div>
        <h2 className="h-section" style={{ maxWidth: 840 }}>
          One agent's verdict on a risky change is one agent's verdict.
        </h2>
        <p className="lede" style={{ color: 'var(--paper-3)' }}>
          For DB migrations, security work, and refactors that touch the whole codebase, you want the change pulled apart by three jobs that don't trust each other — risk, proposal, verification — before merge.
        </p>
        <p className="lede" style={{ color: 'var(--paper-3)', maxWidth: 720 }}>
          Consilium is that structure. It runs on Claude Code via a single skill invocation, lands every decision as canonical JSON in <code style={{ background: 'var(--paper-3)', color: 'var(--ink)', padding: '2px 6px', borderRadius: 3 }}>runs/</code>, and logs the outcome to <code style={{ background: 'var(--paper-3)', color: 'var(--ink)', padding: '2px 6px', borderRadius: 3 }}>FEEDBACK.html</code> so the next deliberation knows what worked.
        </p>
      </div>
    </section>
  );
}

function Footer() {
  return (
    <footer className="footer">
      <div className="container">
        <div className="footer__row">
          <span>Consilium · multi-perspective deliberation for Claude Code</span>
          <span>v2 architecture · explainer</span>
        </div>
      </div>
    </footer>
  );
}

function Tweaks({ t, setTweak }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Appearance" />
      <TweakRadio
        label="Theme"
        value={t.theme}
        options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
        onChange={(v) => setTweak('theme', v)}
      />
      <TweakRadio
        label="Density"
        value={t.density}
        options={[{ value: 'comfortable', label: 'Comfy' }, { value: 'compact', label: 'Compact' }]}
        onChange={(v) => setTweak('density', v)}
      />
    </TweaksPanel>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
