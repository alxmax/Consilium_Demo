// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-source="src/primitives.jsx">
/* primitives.jsx — shared bits: voice tokens, SVG nodes, arrow defs */

const VOICES = {
  gen: { id: 'gen', letter: 'G', name: 'Generator', role: 'creative', color: 'var(--gen)' },
  ctl: { id: 'ctl', letter: 'C', name: 'Control', role: 'analytical', color: 'var(--ctl)' },
  con: { id: 'con', letter: 'K', name: 'Conservator', role: 'prudent', color: 'var(--con)' },
};

function VToken({ v, children }) {
  const cls = `vtoken vtoken--${v}`;
  const name = children || VOICES[v].name;
  return (
    <span className={cls}>
      <span className="vtoken__bullet" />
      {name}
    </span>
  );
}

/* === SVG arrow marker defs — drop into <defs> once per SVG === */
function ArrowDefs({ id = 'arrow' }) {
  return (
    <defs>
      <marker id={`${id}`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="var(--ink)" />
      </marker>
      <marker id={`${id}-faint`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="var(--ink-3)" />
      </marker>
      <marker id={`${id}-gen`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="var(--gen)" />
      </marker>
      <marker id={`${id}-ctl`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="var(--ctl)" />
      </marker>
      <marker id={`${id}-con`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="var(--con)" />
      </marker>
    </defs>
  );
}

/* Voice node — letter in colored chip. cx,cy is center. */
function VoiceNode({ v, cx, cy, r = 18, label }) {
  const colorMap = {
    gen: { soft: 'var(--gen-soft)', ink: 'var(--gen-ink)', stroke: 'var(--gen)' },
    ctl: { soft: 'var(--ctl-soft)', ink: 'var(--ctl-ink)', stroke: 'var(--ctl)' },
    con: { soft: 'var(--con-soft)', ink: 'var(--con-ink)', stroke: 'var(--con)' },
  };
  const c = colorMap[v];
  return (
    <g>
      <circle cx={cx} cy={cy} r={r} fill={c.soft} stroke={c.stroke} strokeWidth="1.2" />
      <text x={cx} y={cy + 4} textAnchor="middle" fontFamily="var(--font-mono)" fontWeight="600" fontSize="13" fill={c.ink}>
        {VOICES[v].letter}
      </text>
      {label && (
        <text x={cx} y={cy + r + 14} textAnchor="middle" className="d-label">
          {label}
        </text>
      )}
    </g>
  );
}

/* Box node with title + optional subtitle */
function BoxNode({ x, y, w, h, title, sub, isolated, fill, stroke }) {
  return (
    <g>
      <rect
        x={x}
        y={y}
        width={w}
        height={h}
        rx="3"
        className={isolated ? 'd-box d-box--isolated' : 'd-box'}
        style={fill ? { fill, stroke: stroke || 'var(--rule-2)' } : undefined}
      />
      {title && (
        <text x={x + w / 2} y={y + h / 2 + (sub ? -4 : 4)} textAnchor="middle" className="d-title">
          {title}
        </text>
      )}
      {sub && (
        <text x={x + w / 2} y={y + h / 2 + 12} textAnchor="middle" className="d-faint">
          {sub}
        </text>
      )}
    </g>
  );
}

/* Section frame — eyebrow + title + lede in one component */
function SectionHead({ num, eyebrow, title, lede, children }) {
  return (
    <header style={{ marginBottom: 28 }}>
      {num && <div className="divider-num"><span className="divider-num__id">{num}</span> <span style={{ color: 'var(--ink-3)' }}>·</span> {eyebrow}</div>}
      {!num && eyebrow && <p className="eyebrow">{eyebrow}</p>}
      <h2 className="h-section">{title}</h2>
      {lede && <p className="lede">{lede}</p>}
      {children}
    </header>
  );
}

Object.assign(window, {
  VOICES,
  VToken,
  ArrowDefs,
  VoiceNode,
  BoxNode,
  SectionHead,
});

</script>
<script type="text/babel" data-source="src/extras.jsx">

  const MODES_PLOT = [
    { id: 'BARE', x: 0.02, y: 0.78, label: 'sonnet_bare', cost: 'baseline · $0.148', model: 'Sonnet 4.6', sub: 'bare model · no Consilium', color: 'var(--ink-3)' },
    { id: 'SEQ',  x: 0.20, y: 1.00, label: 'Sequential', cost: '1× · $0.189', model: 'Sonnet 4.6', sub: 'default · 0 sub-agents', color: 'var(--con)' },
    { id: 'DIAL', x: 0.40, y: 1.33, label: 'Dialectic', cost: '1.33×', model: 'Sonnet 4.6', sub: 'seq + 1 Skeptic', color: 'var(--ctl)' },

        <line x1={padL} y1={padT + plotH} x2={W - padR} y2={padT + plotH} stroke="var(--ink-3)" strokeWidth="1" />
        <line x1={padL} y1={padT} x2={padL} y2={padT + plotH} stroke="var(--ink-3)" strokeWidth="1" />

        {/* Quadrant guide text */}

          cheap + isolated
        </text>

        {/* Points */}
        {MODES_PLOT.map((m, i) => {

}

/* === Cost relative bar chart + table === */
function CostBars() {

      <p className="body-prose" style={{ color: 'var(--ink-2)', fontSize: 14, marginBottom: 18, maxWidth: 720 }}>
        Each bar is the API cost of a single deliberation relative to Sequential. Independence comes at a multiplicative cost — three sub-agents cost three Claude invocations.
      </p>

      <div style={{ border: '1px solid var(--rule)', borderRadius: 2, background: 'var(--paper)', overflow: 'hidden' }}>
        {ROWS.map((r, i) => {
          const pct = (r.cost / maxCost) * 100;

            </div>
          );
        })}
      </div>
      <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', marginTop: 10 }}>
        + <code>skeptic_on_chosen</code> adds +1 sub-agent to any base mode (advisory by default).
      </p>
    </div>
  );
}

/* === Benchmark section === */

const BENCH_TASKS = [
  {
    id: 'circuit_breaker',
    name: 'Circuit Breaker',
    kind: 'Code',
    lang: 'C++17',
    difficulty: 'Hard',
    summary: 'Implement a three-state circuit breaker (CLOSED → OPEN → HALF_OPEN) header-only in C++17. No threading, no callable wrapper — just state and transitions. Sharp edges on the half-open path.',

Pick one. Justify.`,

const MODES_TESTED = [
  { id: 'sonnet_bare',   name: 'sonnet_bare',        tag: 'baseline', desc: 'Single Sonnet invocation, no orchestration.' },
  { id: 'superpowers',   name: 'superpowers',        tag: 'baseline', desc: 'Sonnet + tool harness, no Consilium.' },

          num="09"

    payload: '{ net_concern: 0.25, tokens_budget.control: 800 }',

    caption: 'The three scores combine: a weighted mean of generator + control + safety, where safety = 1 − conservator. The flip is because Conservator scores risk (high = bad) while the other two score utility (high = good). A risk score above 0.8 is a unilateral veto. The winner and its confidence land in the canonical report.',

function VoiceJourney() {
  const [active, setActive] = React.useState(0);
  const [playing, setPlaying] = React.useState(false);
  const timer = React.useRef(null);

  React.useEffect(() => {
    if (!playing) return;
    timer.current = setTimeout(() => {
      setActive((a) => {
        if (a >= JOURNEY_STEPS.length - 1) { setPlaying(false); return a; }
        return a + 1;
      });
    }, 2400);
    return () => clearTimeout(timer.current);
  }, [playing, active]);

  const step = JOURNEY_STEPS[active];

  return (
    <div style={{ margin: '40px 0 8px' }}>
      <h3 className="h-sub" style={{ marginBottom: 6 }}>One candidate's journey</h3>
      <p className="body-prose" style={{ color: 'var(--ink-2)', marginBottom: 16, maxWidth: 760 }}>
        Hit play and follow a single change through the default Sequential pipeline — who sees what, what gets stripped between voices, and where the scores meet.
      </p>

      <div className="pipeline__playhead" style={{ marginBottom: 14 }}>
        <button className="btn" onClick={() => { if (active >= JOURNEY_STEPS.length - 1) setActive(0); setPlaying(!playing); }}>
          {playing ? <>■ pause</> : <>▶ play</>}
        </button>
        <button className="btn btn--ghost" onClick={() => { setPlaying(false); setActive(0); }}>
          ⟲ reset
        </button>
        <span style={{ color: 'var(--ink-3)' }}>step {active + 1} of {JOURNEY_STEPS.length}</span>
      </div>

      <JourneyDiagram focus={step.focus} stepIndex={active} />

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, margin: '16px 0 12px' }}>
        {JOURNEY_STEPS.map((s, i) => (
          <button key={i} className="step-pill" data-active={i === active} onClick={() => { setPlaying(false); setActive(i); }}>
            <span className="step-pill__id">{s.id}</span>
            <span className="step-pill__name">{s.name}</span>
          </button>
        ))}
      </div>

      <div style={{ border: '1px solid var(--rule)', borderLeft: '3px solid var(--ink)', borderRadius: 4, background: 'var(--paper)', padding: '14px 18px', maxWidth: 860 }}>
        <p style={{ margin: 0, fontSize: 14.5, lineHeight: 1.6, color: 'var(--ink)' }}>{step.caption}</p>
        <div style={{ marginTop: 8, fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--ink-3)' }}>
          <span style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>carries · </span>
          <code>{step.payload}</code>
        </div>
      </div>
    </div>
  );
}

function JourneyDiagram({ focus, stepIndex }) {

      setActive((a) => {

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="diagram" style={{ maxHeight: 280 }} aria-hidden="true">

      {/* Flow line behind boxes */}
      <line x1={xFor(0) + stationW} y1={ystation + stationH / 2} x2={xFor(STEPS.length - 1)} y2={ystation + stationH / 2} className="d-rule" />

      {/* Stations */}
      {STEPS.map((s, i) => {
        const x = xFor(i);
        const isActive = i === active;
        const isPast = i < active;
        const voiceColor = s.voice
          ? { gen: 'var(--gen)', ctl: 'var(--ctl)', con: 'var(--con)' }[s.voice]
          : null;
        const voiceSoft = s.voice
          ? { gen: 'var(--gen-soft)', ctl: 'var(--ctl-soft)', con: 'var(--con-soft)' }[s.voice]
          : null;

        return (
          <g key={s.id}>
            <rect
              x={x}
              y={ystation}
              width={stationW}
              height={stationH}
              rx="3"
              fill={isActive ? 'var(--ink)' : (voiceSoft || 'var(--paper)')}
              stroke={isActive ? 'var(--ink)' : (voiceColor || 'var(--rule-2)')}
              strokeWidth={isActive ? 1.5 : 1}
              opacity={isPast ? 0.92 : 1}
              style={{ transition: 'all 0.3s' }}
            />
            <text
              x={x + 8}
              y={ystation + 14}
              className="d-faint"
              style={{ fill: isActive ? 'var(--paper)' : 'var(--ink-3)', fontSize: 8 }}
            >
              STEP {s.id}
            </text>
            <text
              x={x + 8}
              y={ystation + 34}
              style={{
                fontFamily: 'var(--font-mono)',
                fontSize: 10,
                fontWeight: 500,
                fill: isActive ? 'var(--paper)' : 'var(--ink)',
              }}
            >
              {s.name}
            </text>
            {s.voice && (
              <circle
                cx={x + stationW - 10}
                cy={ystation + 10}
                r="5"
                fill={isActive ? 'var(--paper)' : voiceColor}
              />
            )}
            {s.voices && s.voices.map((v, vi) => (
              <circle
                key={v}
                cx={x + stationW - 10 - vi * 9}
                cy={ystation + 10}
                r="4"
                fill={isActive ? 'var(--paper)' : { gen: 'var(--gen)', ctl: 'var(--ctl)', con: 'var(--con)' }[v]}
              />

            {isActive && (
              <g>
                <circle cx={x + stationW / 2} cy={ystation + stationH + 14} r="3" fill="var(--ink)" />

  );
}

<script type="text/babel" data-source="src/voting.jsx">
/* voting.jsx — live aggregation calculator */

const PRESETS = {
  safe:   { g: 0.80, c: 0.90, k: 0.30, label: 'A — safe' },
  medium: { g: 0.90, c: 0.80, k: 0.60, label: 'B — medium' },
  risky:  { g: 0.85, c: 0.85, k: 0.85, label: 'C — risky' },
};

const SCHEMES = [
  {
    id: 'majority',
    name: 'majority',
    sub: 'mean of all three voices, no risk flip (treats risk as utility)',
    veto: false,
  },
  {
    id: 'override',
    name: 'conservative_override',
    sub: 'weighted mean with safety = 1 − k · Conservator holds veto at k > 0.8',
    veto: true,
    isDefault: true,
  },
  {
    id: 'risk_adj',
    name: 'risk_adjusted_utility',
    sub: 'mean(g, c, 1−k) with sigmoid penalty centered at k = 0.5 · no hard veto',
    veto: false,
  },
];

function compute({ g, c, k }, schemeId) {
  switch (schemeId) {
    case 'majority':
      return { value: (g + c + k) / 3, veto: false };
    case 'override': {
      if (k > 0.8) return { value: null, veto: true };
      const safety = 1 - k;
      return { value: (g + c + safety) / 3, veto: false };
    }
    case 'risk_adj': {
      const baseUtil = (g + c + (1 - k)) / 3;
      const penalty = 1 / (1 + Math.exp(-(k - 0.5) / 0.1));
      return { value: baseUtil * (1 - penalty), veto: false };
    }
    default:
      return { value: 0, veto: false };
  }
}

function VotingSection() {
  const [candidate, setCandidate] = React.useState({ g: 0.85, c: 0.85, k: 0.5 });
  const [activePreset, setActivePreset] = React.useState(null);

  const setVal = (key, val) => {
    setCandidate((c) => ({ ...c, [key]: val }));
    setActivePreset(null);
  };

  const loadPreset = (id) => {
    const p = PRESETS[id];
    setCandidate({ g: p.g, c: p.c, k: p.k });
    setActivePreset(id);
  };

  const results = SCHEMES.map((s) => ({ ...s, result: compute(candidate, s.id) }));

  return (
    <section className="section" id="voting">
      <div className="container">
        <SectionHead
          num="06"
          eyebrow="Aggregation"
          title="Three schemes. Same scores. Different winners."
          lede="The voices produce three numbers. How you combine them is the political question. Drag the sliders or pick a preset — watch the schemes disagree."
        />

        <div className="tldr">
          <span className="tldr__label">In plain words</span>
          <div>
            <p>Three voices vote. The default scheme flips the Conservator's risk score into a <strong>safety</strong> score before averaging, then lets the Conservator veto anything genuinely dangerous. The other two schemes either ignore risk or smooth it with a sigmoid.</p>
          </div>
        </div>

        <div className="voting">
          <div className="voting__controls">
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 18 }}>
              Voice scores · candidate
            </div>

            <div className="slider-group">
              <div className="slider-group__head">
                <span className="slider-group__name"><VToken v="gen">Generator</VToken> · utility</span>
                <span className="slider-group__val">{candidate.g.toFixed(2)}</span>
              </div>
              <input type="range" min="0" max="1" step="0.01" value={candidate.g} onChange={(e) => setVal('g', parseFloat(e.target.value))} className="slider slider--gen" />
              <div className="slider-group__hint">how well it solves the problem (higher = better)</div>
            </div>

            <div className="slider-group">
              <div className="slider-group__head">
                <span className="slider-group__name"><VToken v="ctl">Control</VToken> · correctness</span>
                <span className="slider-group__val">{candidate.c.toFixed(2)}</span>
              </div>
              <input type="range" min="0" max="1" step="0.01" value={candidate.c} onChange={(e) => setVal('c', parseFloat(e.target.value))} className="slider slider--ctl" />
              <div className="slider-group__hint">type / logic / test correctness (higher = better)</div>
            </div>

            <div className="slider-group">
              <div className="slider-group__head">
                <span className="slider-group__name"><VToken v="con">Conservator</VToken> · risk</span>
                <span className="slider-group__val">{candidate.k.toFixed(2)}</span>
              </div>
              <input type="range" min="0" max="1" step="0.01" value={candidate.k} onChange={(e) => setVal('k', parseFloat(e.target.value))} className="slider slider--con" />
              <div className="slider-group__hint">risk score (higher = MORE risk · veto at &gt; 0.80)</div>
            </div>

            <div style={{ marginTop: 18, paddingTop: 18, borderTop: '1px solid var(--rule)' }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 8 }}>
                presets — original page example
              </div>
              <div className="scheme-presets">
                {Object.entries(PRESETS).map(([id, p]) => (
                  <button key={id} className="preset-chip" data-active={activePreset === id} onClick={() => loadPreset(id)}>
                    {p.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div className="voting__results">
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 18 }}>
              Aggregated score per scheme
            </div>

            {results.map((s) => {
              const r = s.result;
              return (
                <div key={s.id} className="scheme-row">
                  <div className="scheme-row__name">
                    {s.name}{s.isDefault && <span style={{ color: 'var(--ink-3)', fontSize: 10, marginLeft: 6 }}>· DEFAULT</span>}
                    <small>{s.sub}</small>
                  </div>
                  <div className="scheme-row__bar">
                    {r.veto ? (
                      <div className="scheme-row__bar-fill scheme-row__bar-fill--veto" style={{ width: '100%' }} />
                    ) : (
                      <div className="scheme-row__bar-fill" style={{ width: `${Math.max(0, Math.min(1, r.value)) * 100}%` }} />
                    )}
                  </div>
                  <div className={r.veto ? 'scheme-row__val scheme-row__val--veto' : 'scheme-row__val'}>
                    {r.veto ? 'VETO' : r.value.toFixed(3)}
                  </div>
                </div>
              );
            })}

            <div className="note" style={{ marginTop: 24 }}>
              <span className="note__label">Why the default is conservative_override</span>
              <span>
                The naive <code>majority</code> scheme treats the Conservator score as utility — higher = better — which picks the <em>riskier</em> candidate. Only the schemes that flip risk into safety (<code>1 − k</code>), i.e. <code>conservative_override</code> and <code>risk_adjusted_utility</code>, give the intuitive verdict.
              </span>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

window.VotingSection = VotingSection;

</script>

function ModesSection() {
  const [active, setActive] = React.useState('seq_blind');
  const mode = MODES.find((m) => m.id === active);
  const walkthrough = WALKTHROUGHS[active];

  /* per-mode playback state */
  const [step, setStep] = React.useState(0);
  const [playing, setPlaying] = React.useState(false);
  const playRef = React.useRef(null);

  React.useEffect(() => {
    setStep(0);
    setPlaying(false);
  }, [active]);

  React.useEffect(() => {
    if (!playing) return;
    playRef.current = setTimeout(() => {
      setStep((s) => {
        if (s >= walkthrough.steps.length - 1) {
          setPlaying(false);
          return s;
        }
        return s + 1;
      });
    }, 1500);
    return () => clearTimeout(playRef.current);
  }, [playing, step, walkthrough]);

  const currentStep = walkthrough.steps[step] || walkthrough.steps[0];

  return (
    <section className="section section--tinted" id="modes">
      <div className="modes-bg-extra" aria-hidden="true" />
      <div className="container">
        <SectionHead
          num="07"
          eyebrow="Modes"
          title="Four ways to run the same voices."
          lede="Modes differ in how voices are isolated and how often they get to talk. Pick a mode below, then hit play to see how a single diff actually travels through it."
        />

        <div className="tldr">
          <span className="tldr__label">In plain words</span>
          <div>
            <p>Same three voices, different staging. The default mode runs everything in one Claude turn with information filtered between voices. Other modes spin up isolated sub-agents — three different "personalities" in <strong>Trias</strong>, or a single challenger in <strong>Dialectic</strong> and <strong>Skeptic-on-chosen</strong>.</p>
          </div>
        </div>

        {/* Which mode when? — routing boundary from SKILL.md */}
        <div style={{ margin: '0 0 28px', border: '1px solid var(--rule)', borderRadius: 4, background: 'var(--paper)', overflow: 'hidden' }}>
          <div style={{ padding: '10px 16px', fontFamily: 'var(--font-mono)', fontSize: 10.5, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-3)', borderBottom: '1px solid var(--rule)' }}>
            Which mode, when — the routing boundary
          </div>
          {[
            ['Obvious bugfix, or diff < 20 lines / 1 file', 'Sequential', 'the scope gate usually skips deliberation entirely'],
            ['Any other PR-level review', 'Sequential', 'default review — escalate to Trias if critical + irreversible'],
            ['A chosen answer came back shaky (confidence ≤ 0.7) with one nagging concern', 'Dialectic + skeptic_on_chosen', 'focal post-hoc challenge on exactly that answer'],
            ['2+ plausible architectural approaches, no clear winner', 'Trias', 'three Sonnet personalities with different lens weights, settled by vote'],
          ].map(([when, mode, why]) => (
            <div key={mode + when} style={{ display: 'grid', gridTemplateColumns: 'minmax(220px, 1.4fr) minmax(150px, 0.8fr) 1.2fr', gap: 12, padding: '10px 16px', borderBottom: '1px solid var(--rule)', fontSize: 13, alignItems: 'baseline' }}>
              <span style={{ color: 'var(--ink)' }}>{when}</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600, color: 'var(--ink)' }}>{mode}</span>
              <span style={{ color: 'var(--ink-2)' }}>{why}</span>
            </div>
          ))}
        </div>

        <div className="mode-panel">
          <div className="mode-panel__controls">
            <button className="btn" onClick={() => { if (step >= walkthrough.steps.length - 1) setStep(0); setPlaying(!playing); }}>
              {playing ? <>■ pause</> : <>▶ play how data flows</>}
            </button>
            <button className="btn btn--ghost" onClick={() => { setPlaying(false); setStep(0); }}>
              ⟲ reset
            </button>
            <div className="mode-panel__caption">{currentStep.caption}</div>
          </div>

          <div className="mode-panel__info">
            <div>
              <div className="mode-panel__sub">MODE · {mode.tag}</div>
              <h3 className="mode-panel__title">{mode.name}</h3>
              <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.08em', textTransform: 'uppercase', margin: '4px 0 6px' }}>
                Plain words
              </p>
              <p style={{ fontSize: 15, lineHeight: 1.5, color: 'var(--ink)', margin: '0 0 18px', textWrap: 'pretty' }}>
                {mode.plain}
              </p>
              <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', letterSpacing: '0.08em', textTransform: 'uppercase', margin: '0 0 6px' }}>
                Technical
              </p>
              <p className="mode-panel__desc">{mode.desc}</p>
            </div>
            <div>
              <dl className="mode-panel__meta">
                <dt>Use when</dt><dd>{mode.use}</dd>
                <dt>Cost</dt><dd>{mode.cost}</dd>
                <dt>Voices</dt><dd>{mode.voices}</dd>
                <dt>Sub-agents</dt><dd>{mode.subagents}</dd>
              </dl>
            </div>
          </div>

          {/* === Mode tabs — placed just before the diagram so they obviously control it === */}
          <div className="modes-tabs modes-tabs--inline">
            <span className="modes-tabs__label">switch mode →</span>
            {MODES.map((m) => (
              <button
                key={m.id}
                className="mode-tab"
                data-active={m.id === active}
                onClick={() => setActive(m.id)}
              >
                {m.name}
                <span className="mode-tab__tag">{m.tag}</span>
              </button>
            ))}
          </div>

          {/* === Full-width animated walkthrough === */}
          <div className="walkthrough">
            <div className="walkthrough__timeline">
              {walkthrough.steps.map((s, i) => {
                const state = i < step ? 'done' : (i === step ? 'active' : 'idle');
                return (
                  <button
                    key={s.id}
                    className="timeline-step"
                    data-state={state}
                    onClick={() => { setPlaying(false); setStep(i); }}
                  >
                    <span className="timeline-step__id">{s.id}</span>
                    <span className="timeline-step__name">{s.name}</span>
                  </button>
                );
              })}
            </div>

            <div className="walkthrough__stage">
              <ModeStage layout={walkthrough.layout} step={currentStep} />
            </div>

            <div className="mode-panel__controls mode-panel__controls--bottom">
              <button className="btn" onClick={() => { if (step >= walkthrough.steps.length - 1) setStep(0); setPlaying(!playing); }}>
                {playing ? <>■ pause</> : <>▶ play how data flows</>}
              </button>
              <button className="btn btn--ghost" onClick={() => { setPlaying(false); setStep(0); }}>
                ⟲ reset
              </button>
              <div className="mode-panel__caption">
                <span className="mode-panel__caption-hint">switching modes redraws this diagram →</span>
              </div>
            </div>
          </div>
        </div>

        {/* === End-to-end lifecycle: request → deliberation → code → learn === */}
        <h3 className="h-sub" style={{ fontSize: 20, margin: '44px 0 4px' }}>From request to written code</h3>
        <p className="body-prose" style={{ color: 'var(--ink-2)', fontSize: 14, marginBottom: 18, maxWidth: 760 }}>
          A mode is only the middle act. Here is the whole path a change travels — and how it loops back to make the next run smarter.
        </p>
        <div style={{ display: 'flex', alignItems: 'stretch', gap: 0, overflowX: 'auto', fontFamily: 'var(--font-mono)' }}>
          {[
            { tag: 'USER', title: '/consilium', sub: 'invokes the skill on a diff, a question, or a change to plan', color: 'var(--ink)' },
            { tag: 'DELIBERATION', title: 'a mode runs', sub: 'Generator → Conservator → Control under the 8-component veto cascade → a chosen approach + confidence, saved as canonical JSON in runs/', color: 'var(--ctl)' },
            { tag: 'IMPLEMENTATION', title: 'Step 7 pipeline', sub: 'if the prompt declares deliverables: Coder → (Test Writer ∥ Reviewer) → red→green gate → files written to disk', color: 'var(--gen)' },
            { tag: 'LEARN', title: 'feedback loop', sub: 'the outcome is logged to FEEDBACK.html; priors.py feeds it into the next deliberation', color: 'var(--con)' },
          ].map((s, i, arr) => (
            <React.Fragment key={s.tag}>
              <div style={{ flex: '1 1 0', minWidth: 150, padding: '14px 16px', border: '1px solid var(--rule)', borderTop: `3px solid ${s.color}`, borderRadius: 4, background: 'var(--paper)' }}>
                <div style={{ fontSize: 10, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--ink-3)', marginBottom: 4 }}>{s.tag}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: s.color, marginBottom: 6 }}>{s.title}</div>
                <div style={{ fontSize: 11.5, color: 'var(--ink-2)', lineHeight: 1.5, fontFamily: 'var(--font-sans)' }}>{s.sub}</div>
              </div>
              {i < arr.length - 1 && (
                <div style={{ alignSelf: 'center', padding: '0 8px', color: 'var(--ink-3)', fontSize: 14, flexShrink: 0 }}>▶</div>
              )}
            </React.Fragment>
          ))}
        </div>
        <p style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)', marginTop: 8 }}>
          ↻ LEARN feeds back into the next DELIBERATION — the loop closes on disk. The last two stages have their own tabs: <strong>Integration</strong> (pipeline) and <strong>Calibration</strong> (feedback).
        </p>

        <CostScatter />
        <CostBars />
      </div>
    </section>
  );
}

/* === Per-layout SVG stages === */

function ModeStage({ layout, step }) {
  switch (layout) {
    case 'seq':       return <StageSeq step={step} />;
    case 'dialectic': return <StageDialectic step={step} />;
    case 'trias':     return <StageTrias step={step} />;
    case 'skeptic':   return <StageSkeptic step={step} />;
    default: return null;
  }
}

/* Helpers */

function WVoice({ x, y, v, state, label, w = 86, h = 44, dashed }) {
  const c = { gen: 'var(--gen)', ctl: 'var(--ctl)', con: 'var(--con)', skp: 'oklch(0.55 0.16 320)' }[v] || 'var(--ink)';
  const s = { gen: 'var(--gen-soft)', ctl: 'var(--ctl-soft)', con: 'var(--con-soft)', skp: 'oklch(0.94 0.04 320)' }[v] || 'var(--paper)';
  const letter = { gen: 'G', ctl: 'C', con: 'K', skp: 'S' }[v] || '';
  return (
    <g className={`wt-voice wt-voice--${state}`}>
      <rect x={x} y={y} width={w} height={h} rx="4" fill={s} stroke={c} strokeWidth="1.4" strokeDasharray={dashed ? '4 3' : undefined} />
      <circle cx={x + 14} cy={y + h / 2} r="9" fill={c} />
      <text x={x + 14} y={y + h / 2 + 3} textAnchor="middle" style={{ fontFamily: 'var(--font-mono)', fontWeight: 600, fontSize: 11, fill: 'var(--paper)' }}>{letter}</text>
      <text x={x + 28} y={y + h / 2 + 4} style={{ fontFamily: 'var(--font-mono)', fontSize: 11, fill: 'var(--ink)' }}>{label}</text>
    </g>
  );
}

function WBox({ x, y, w, h, title, state, dashed, fill }) {
  return (
    <g className={`wt-voice wt-voice--${state}`}>
      <rect x={x} y={y} width={w} height={h} rx="4" fill={fill || 'var(--paper)'} stroke="var(--ink)" strokeWidth="1.4" strokeDasharray={dashed ? '4 3' : undefined} />
      <text x={x + w / 2} y={y + h / 2 + 4} textAnchor="middle" style={{ fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 500, fill: 'var(--ink)' }}>{title}</text>
    </g>
  );
}

function WArrow({ d, state, dashed, label, labelX, labelY, color = 'var(--ink)' }) {
  return (
    <g className={`wt-arrow wt-arrow--${state}`}>
      <path d={d} fill="none" stroke={color} strokeWidth="1.6" strokeDasharray={dashed ? '4 3' : undefined} markerEnd="url(#wt-arrow)" />
      {label && state !== 'idle' && (
        <text x={labelX} y={labelY} textAnchor="middle" style={{ fontFamily: 'var(--font-mono)', fontSize: 9, fill: 'var(--ink-3)' }}>{label}</text>
      )}
    </g>
  );
}

function WtDefs() {
  return (
    <defs>
      <marker id="wt-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10z" fill="var(--ink)" />
      </marker>
    </defs>
  );
}

/* === Sequential stage (handles blind + naive) === */
function StageSeq({ step }) {
  const ns = step.nodes;
  const ar = step.arrows;

  const has = (id) => ar.includes(id);
  const stripState = (full, stripped) =>
    has(stripped) ? 'active' : (has(full) ? 'done' : 'idle');

  return (
    <svg viewBox="0 0 720 320" className="diagram">
      <WtDefs />

      {/* Orchestrator */}
      <WBox x={20} y={140} w={90} h={48} title="orch" state={ns.orch} />
      <text x={65} y={130} textAnchor="middle" className="d-faint" style={{ fontSize: 9 }}>claude main</text>

      {/* Three voices — Generator first */}
      <WVoice x={170} y={48} v="gen" state={ns.gen} label="Generator" />
      <WVoice x={170} y={144} v="con" state={ns.cons} label="Conservator" />
      <WVoice x={170} y={240} v="ctl" state={ns.ctl} label="Control" />

      {/* Aggregator */}
      <WBox x={400} y={140} w={90} h={48} title="aggregate" state={ns.agg} fill="var(--paper-2)" />

      {/* Output */}
      <WBox x={560} y={140} w={130} h={48} title="chosen → runs/" state={has('agg_out') ? 'done' : 'idle'} />

      {/* Arrows: orch → gen (Generator first) */}
      <WArrow d="M 110 164 C 130 164, 140 80, 168 78" state={has('orch_gen') ? (ns.gen === 'active' ? 'active' : 'done') : 'idle'} />

      {/* gen → cons (strip → candidates) */}
      <WArrow
        d="M 213 96 C 213 130, 213 142, 213 144"
        state={has('gen_cons') ? (ns.cons === 'active' ? 'active' : 'done') : 'idle'}
        dashed={has('gen_cons')}
        label={has('gen_cons') ? 'strip → candidates' : ''}
        labelX={272} labelY={120}
      />

      {/* cons → ctl (strip → risk read) */}
      <WArrow
        d="M 213 188 C 213 220, 213 234, 213 240"
        state={has('cons_ctl') ? (ns.ctl === 'active' ? 'active' : 'done') : 'idle'}
        dashed={has('cons_ctl')}
        label={has('cons_ctl') ? 'strip → risk' : ''}
        labelX={278} labelY={218}
      />

      {/* All three voices → aggregator (gen top, cons mid, ctl bottom) */}
      <WArrow d="M 256 78 C 310 78, 360 140, 400 162" state={has('gen_agg') ? 'active' : 'idle'} />
      <WArrow d="M 256 166 L 400 166" state={has('cons_agg') ? 'active' : 'idle'} />
      <WArrow d="M 256 262 C 310 262, 360 188, 400 170" state={has('ctl_agg') ? 'active' : 'idle'} />

      {/* aggregator → output */}
      <WArrow d="M 490 164 L 560 164" state={has('agg_out') ? 'active' : 'idle'} />
    </svg>
  );
}

  return (

      <WArrow d="M 218 138 L 290 138" state={has('ctl_agg') ? (ns.agg === 'active' ? 'active' : 'done') : 'idle'} />

      <text x="20" y="252" className="d-faint">STAGE 2 — SKEPTIC SUB-AGENT (ISOLATED)</text>

function HeatCell({ w, color }) {

          color: alpha > 0.55 ? 'var(--paper)' : 'var(--ink)',

  );
}

function LoopSection() {

        <SectionHead
          num="10"
          eyebrow="Calibration"
          title="The skill calibrates itself between runs."
          lede="Every deliberation appends an outcome line to FEEDBACK.html. Before the next run, priors.py reads the log and computes soft priors the orchestrator injects at step 0 — so the system's risk intuition tunes itself on real history."
        />

        <div className="loop-cell">
          <LoopDiagram />
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 16, marginTop: 28 }}>
          <OutcomeChip code="OK" desc="auto-logged, confidence ≥ 0.7" />
          <OutcomeChip code="OVR" desc="user overrode the chosen candidate" />
          <OutcomeChip code="PEND" desc="deferred — retro-closed via stale_pendings" warn />
          <OutcomeChip code="PEND_HEADLESS" desc="deferred in headless mode (--yes); no interactive prompt possible" warn />
          <OutcomeChip code="BAD" desc="set manually later if the decision failed" warn />
        </div>

        <h3 className="h-sub" style={{ marginTop: 44, fontSize: 20 }}>What "calibration" actually means here</h3>
        <p className="body-prose" style={{ color: 'var(--ink-2)', marginBottom: 14, maxWidth: 780 }}>
          Nothing is re-trained — there are no model weights to update. Calibration here is bookkeeping: each run leaves a typed trace on disk, and <code>priors.py</code> distils the accumulated traces into a few soft signals injected at the next run's bootstrap (step 0). The signals <strong>nudge attention and surface unfinished business — they never override a voice or change a score</strong>. It is a slow instrument: a single run barely moves anything; the patterns only become legible across dozens of runs.
        </p>

        <h3 className="h-sub" style={{ marginTop: 24, fontSize: 16 }}>The signals priors.py computes</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12, marginTop: 12 }}>
          {[
            { k: 'override_rate', v: 'how often the human overrode the chosen answer — a standing humility signal on the aggregator' },
            { k: 'veto_rate', v: 'how often Conservator vetoed every candidate — flags task types where the skill keeps stalling' },
            { k: 'recurring keywords', v: 'task labels that keep reappearing, so a repeat decision can reuse a prior authoritative run (passthrough)' },
            { k: 'stale_pendings', v: 'PEND rows older than 2 days — the next run pauses to ask you to close them before deliberating' },
            { k: 'weighted_bad_rate', v: 'BAD outcomes, with production-confirmed ones (mark_outcome.py) weighted 2× over a subjective first impression' },
            { k: 'pend_pressure', v: 'share of recent runs left unresolved — a soft alert, never a block' },
          ].map((s) => (
            <div key={s.k} style={{ padding: '12px 16px', border: '1px solid var(--rule)', borderRadius: 4, background: 'var(--paper)' }}>
              <code style={{ fontFamily: 'var(--font-mono)', fontSize: 12.5, color: 'var(--ink)', fontWeight: 600 }}>{s.k}</code>
              <div style={{ fontSize: 12.5, color: 'var(--ink-2)', lineHeight: 1.5, marginTop: 4 }}>{s.v}</div>
            </div>
          ))}
        </div>

        <div className="note" style={{ marginTop: 24 }}>
          <span className="note__label">Confidence floors — the per-mode self-check</span>
          <span>
            The other half of calibration runs <em>inside</em> a single deliberation. Each mode has a confidence floor it is expected to clear — <strong>Sequential 0.70 · Dialectic 0.75 · Trias 0.80</strong>. A run that lands below its floor is logged <code>WEAK</code>: a recorded signal that the mode didn't earn its cost on that task. No single WEAK run changes behaviour; the value is the accumulated rate, which becomes meaningful after ~10 runs per mode and tells you whether a pricier mode is actually buying confidence. Sequential also auto-escalates to Dialectic when confidence &lt; 0.60 — distinct from the 0.70 floor: the floor flags a weak-but-kept result; the &lt; 0.60 threshold fires a full mode re-run before the report is written.
          </span>
        </div>

        <div className="note" style={{ marginTop: 16 }}>
          <span className="note__label">Why the loop closes on disk, not in a model</span>
          <span>
            The whole loop is files: <code>.consilium/runs/*.json</code> (one episodic record per run) and <code>.consilium/FEEDBACK.html</code> (one outcome row per use). <code>priors.py</code> reads both at the next bootstrap — that read is the closing edge. Keeping it on disk is deliberate: the trail is inspectable, diffable, and survives across sessions without any training step or external store.
          </span>
        </div>
      </div>
    </section>
  );

function App() {
  const [t, setTweak] = useTweaks(DEFAULTS);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
    document.documentElement.setAttribute('data-density', t.density);
  }, [t.theme, t.density]);

  return (
    <div className="page">
      <ScrollProgress />

      <MobileNav />

      <EfficiencySection />

  );
}

function useActiveSection() {
  const [active, setActive] = React.useState(SECTIONS[0].id);
  React.useEffect(() => {
    const onScroll = () => {
      const middle = window.scrollY + window.innerHeight * 0.35;
      let current = SECTIONS[0].id;
      for (const s of SECTIONS) {
        const el = document.getElementById(s.id);
        if (el && el.offsetTop <= middle) current = s.id;
      }
      setActive(current);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return active;
}

function ScrollProgress() {
  const [pct, setPct] = React.useState(0);
  React.useEffect(() => {
    const onScroll = () => {
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      const p = docH > 0 ? (window.scrollY / docH) * 100 : 0;
      setPct(Math.max(0, Math.min(100, p)));
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return <div className="scroll-progress" style={{ width: `${pct}%` }} aria-hidden="true" />;
}

function SideNav() {
  const active = useActiveSection();
  const handleJump = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const top = el.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top, behavior: 'smooth' });
    }
  };
  return (
    <nav className="side-nav" aria-label="Section navigation">
      <div className="side-nav__label">contents</div>
      <ul className="side-nav__list">
        {SECTIONS.map((s) => (
          <li key={s.id} className="side-nav__item">
            <button
              className="side-nav__link"
              data-active={s.id === active}
              onClick={() => handleJump(s.id)}
            >
              <span className="side-nav__num">{s.num}</span>
              <span>{s.name}</span>
            </button>
          </li>
        ))}
      </ul>
    </nav>
  );
}

function MobileNav() {
  const active = useActiveSection();
  return (
    <nav className="mobile-nav" aria-label="Section navigation">
      {SECTIONS.map((s) => (
        <a key={s.id} href={`#${s.id}`} className="mobile-nav__link" data-active={s.id === active}>
          <span className="mobile-nav__num">{s.num}</span>
          {s.name}

      ))}
    </nav>
  );
}

function ProblemSection() {
  return (
    <section className="section section--inked" id="problem">

        <p className="lede" style={{ color: 'var(--paper-3)' }}>
          Ask one AI to review a risky change and you get one opinion: confident, but unchecked. For changes where a mistake is expensive — touching the database, security, or code the whole project depends on — you want it pulled apart by separate reviewers working in a relay, each unaware of the others' reasoning, so no single judgment goes unchecked.
